<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ صحيح البخاري الذكي</title>
    
    <!-- 1. Script Loading Order: JSZip first, then epub.js, then Tailwind & Fonts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        sepia: {
                            50: '#fbf0d9',
                            100: '#faecd0',
                            200: '#f7dfb3',
                            300: '#f3cc8f',
                            400: '#eeaf61',
                            900: '#432c0e',
                            950: '#261605',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts for professional Arabic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
        }
        /* Custom scrollbar for ultra-dense TOC */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.4);
        }
        /* Sepia Theme Class Overrides */
        .theme-sepia {
            background-color: #fbf0d9 !important;
            color: #432c0e !important;
        }
        .theme-sepia .bg-panel {
            background-color: #faecd0 !important;
            border-color: #e6d5b3 !important;
        }
        .theme-sepia .text-muted {
            color: #70532c !important;
        }
        .theme-sepia .hover-item:hover {
            background-color: #f3cc8f !important;
        }
    </style>
</head>
<body class="h-full overflow-hidden bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- Loading Screen Overlay with dynamic pulse -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center text-white p-6 transition-all duration-500">
        <div class="relative flex items-center justify-center mb-8">
            <div class="absolute animate-ping h-24 w-24 rounded-full bg-emerald-500 opacity-20"></div>
            <div class="absolute animate-pulse h-16 w-16 rounded-full bg-emerald-600 opacity-40"></div>
            <div class="relative rounded-full p-6 bg-slate-900 border border-emerald-500/30 shadow-lg shadow-emerald-500/10">
                <i class="fa-solid fa-book-open text-4xl text-emerald-400"></i>
            </div>
        </div>
        
        <h2 class="text-xl md:text-2xl font-bold text-center mb-4 max-w-md leading-relaxed text-emerald-100">
            جاري تفكيك وفهرسة 1946 باباً من صحيح البخاري، برجاء الانتظار...
        </h2>
        
        <div class="w-64 bg-slate-800 rounded-full h-1.5 mb-3 overflow-hidden">
            <div id="loading-progress" class="bg-emerald-500 h-1.5 rounded-full transition-all duration-300" style="width: 15%"></div>
        </div>
        <p id="loading-status" class="text-sm text-slate-400 animate-pulse">جاري فك ضغط الملف المعقد...</p>
    </div>

    <!-- Main Container Layout -->
    <div class="flex h-screen w-screen overflow-hidden relative">

        <!-- Sidebar: Table of Contents (Optimized for 1,946 Chapters) -->
        <aside id="sidebar" class="fixed inset-y-0 right-0 z-40 w-80 transform translate-x-full lg:translate-x-0 lg:relative flex flex-col bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 transition-transform duration-300 ease-in-out bg-panel">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-emerald-600 dark:text-emerald-400"></i>
                    <h3 class="font-bold text-lg">أبواب صحيح البخاري</h3>
                </div>
                <span id="chapter-count" class="bg-emerald-100 dark:bg-emerald-950 text-emerald-800 dark:text-emerald-300 text-xs px-2.5 py-1 rounded-full font-semibold">1,946 باباً</span>
            </div>

            <!-- Search inside TOC for fast access -->
            <div class="p-3 border-b border-slate-200 dark:border-slate-800">
                <div class="relative">
                    <input type="text" id="toc-search" placeholder="ابحث في الأبواب..." class="w-full pl-3 pr-9 py-2 text-sm bg-slate-100 dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none text-slate-900 dark:text-slate-100">
                    <i class="fa-solid fa-magnifying-glass absolute right-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
            </div>

            <!-- Asynchronous Scrollable TOC Container -->
            <div id="toc-container" class="flex-1 overflow-y-auto p-2 space-y-1 text-right">
                <!-- Loaded items dynamically in chunks to prevent UI freeze -->
            </div>
            
            <!-- Sidebar Footer / Pagination Status -->
            <div class="p-3 bg-slate-50 dark:bg-slate-950/50 border-t border-slate-200 dark:border-slate-800 text-xs text-center text-muted text-slate-500">
                تم تحميل <span id="rendered-toc-count">0</span> من أصل <span id="total-toc-count">0</span>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            
            <!-- Navigation Header Bar -->
            <header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 md:px-6 flex items-center justify-between bg-panel z-30 shadow-sm">
                <!-- Right Controls: Sidebar Toggle & Title -->
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none" aria-label="Toggle Sidebar">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <div class="hidden md:block">
                        <h1 class="font-bold text-slate-800 dark:text-slate-100 text-base md:text-lg truncate max-w-xs lg:max-w-md">صحيح البخاري</h1>
                        <p class="text-xs text-slate-500 dark:text-slate-400">الجامع المسند الصحيح المختصر</p>
                    </div>
                </div>

                <!-- Center: Quick Navigation Info -->
                <div id="current-chapter-title" class="hidden lg:block text-sm font-semibold text-emerald-600 dark:text-emerald-400 truncate max-w-sm">
                    جاري تحميل الباب الحالي...
                </div>

                <!-- Left Controls: Typography, Themes, Layout -->
                <div class="flex items-center gap-1.5 md:gap-3">
                    <!-- Font Size Controls -->
                    <div class="flex items-center border border-slate-200 dark:border-slate-800 rounded-lg overflow-hidden bg-slate-50 dark:bg-slate-800">
                        <button id="font-dec" class="px-3 py-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-sm font-bold" title="تصغير الخط">-</button>
                        <span class="px-2.5 py-1.5 text-xs font-semibold border-x border-slate-200 dark:border-slate-800 select-none">A</span>
                        <button id="font-inc" class="px-3 py-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-sm font-bold" title="تكبير الخط">+</button>
                    </div>

                    <!-- Theme Selector -->
                    <div class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
                        <button onclick="changeTheme('light')" class="w-8 h-8 rounded-md flex items-center justify-center transition-all hover:bg-white dark:hover:bg-slate-700" title="مظهر مضيء">
                            <i class="fa-solid fa-sun text-amber-500 text-sm"></i>
                        </button>
                        <button onclick="changeTheme('sepia')" class="w-8 h-8 rounded-md flex items-center justify-center transition-all hover:bg-amber-100 text-sepia-900" title="مظهر مريح (سيبيا)">
                            <i class="fa-solid fa-eye text-sm"></i>
                        </button>
                        <button onclick="changeTheme('dark')" class="w-8 h-8 rounded-md flex items-center justify-center transition-all hover:bg-slate-950 text-slate-400" title="مظهر مظلم">
                            <i class="fa-solid fa-moon text-sm"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Book Viewer Container (Optimized Sandbox) -->
            <div class="flex-1 relative bg-slate-50 dark:bg-slate-950 transition-colors duration-300 flex items-center justify-center p-4">
                <div id="viewer" class="w-full h-full max-w-4xl bg-white dark:bg-slate-900 shadow-xl border border-slate-200/60 dark:border-slate-800/60 rounded-2xl overflow-hidden bg-panel">
                    <!-- epub.js iframe renders here -->
                </div>

                <!-- Hover/Floating Navigation Buttons -->
                <button id="prev-btn" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-emerald-500 hover:text-white dark:hover:bg-emerald-600 transition-all z-20 focus:outline-none" title="الباب السابق">
                    <i class="fa-solid fa-chevron-right text-lg"></i>
                </button>
                <button id="next-btn" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-emerald-500 hover:text-white dark:hover:bg-emerald-600 transition-all z-20 focus:outline-none" title="الباب التالي">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
            </div>

            <!-- Footer Status / Navigation Metadata -->
            <footer class="h-10 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 flex items-center justify-between text-xs text-slate-500 dark:text-slate-400 bg-panel">
                <div id="book-progress">جاري حساب التقدم...</div>
                <div class="flex items-center gap-4">
                    <span id="book-location">الموقع: --</span>
                </div>
            </footer>
        </main>
    </div>

    <!-- Main Logic Execution -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Path configuration
            const BOOK_PATH = "./79565.epub";
            
            // Initialization of elements
            const loadingOverlay = document.getElementById("loading-overlay");
            const loadingProgress = document.getElementById("loading-progress");
            const loadingStatus = document.getElementById("loading-status");
            const viewer = document.getElementById("viewer");
            const prevBtn = document.getElementById("prev-btn");
            const nextBtn = document.getElementById("next-btn");
            const sidebar = document.getElementById("sidebar");
            const sidebarToggle = document.getElementById("sidebar-toggle");
            const currentChapterTitle = document.getElementById("current-chapter-title");
            const tocContainer = document.getElementById("toc-container");
            const tocSearch = document.getElementById("toc-search");
            const renderedTocCountEl = document.getElementById("rendered-toc-count");
            const totalTocCountEl = document.getElementById("total-toc-count");
            
            let book, rendition;
            let currentFontSize = 115; // default comfortable font size (percentage)
            let originalTocItems = [];
            let filteredTocItems = [];
            let renderedCount = 0;
            const CHUNK_SIZE = 40; // Render small chunks to prevent main-thread freeze
            let currentTheme = localStorage.getItem("reader-theme") || "light";

            // Initialize Epub.js
            try {
                updateLoadingState(30, "جاري فتح الأرشيف واستخراج البيانات...");
                book = ePub(BOOK_PATH);
                
                // Optimized Rendition Setup (Lazy Loading & Chunk Rendering)
                rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    spread: "none",
                    flow: "scrolled-doc", // Better for massive text documents to scrolling smoothly
                    allowScriptedContent: false // Security & speed optimization
                });

                // Load initial location
                rendition.display();

                // Set initial theme and typography
                rendition.themes.fontSize(`${currentFontSize}%`);
                applyTheme(currentTheme);

            } catch (err) {
                console.error("Error loading epub:", err);
                loadingStatus.textContent = "حدث خطأ أثناء تحميل الكتاب. يرجى التحقق من وجود الملف في المسار الصحيح.";
                loadingStatus.classList.add("text-red-500");
            }

            // Hook up book loaded events
            book.ready.then(() => {
                updateLoadingState(60, "جاري معالجة الهيكل الداخلي للمجلدات...");
            });

            // 3. Asynchronous Table of Contents Engine
            book.loaded.navigation.then((navigation) => {
                updateLoadingState(85, "جاري بناء الفهرس الذكي (1946 باباً)...");
                
                // Flatten navigation array if nested
                originalTocItems = flattenToc(navigation.toc);
                filteredTocItems = [...originalTocItems];
                
                totalTocCountEl.textContent = originalTocItems.length;
                document.getElementById("chapter-count").textContent = `${originalTocItems.length} باباً`;
                
                // Start safe, non-blocking asynchronous rendering loop
                renderedCount = 0;
                tocContainer.innerHTML = "";
                renderTocChunksAsync();
            });

            // Non-blocking TOC generator using requestAnimationFrame to yield to the main thread
            function renderTocChunksAsync() {
                if (renderedCount >= filteredTocItems.length) {
                    // All elements processed, hide loading screen smoothly
                    setTimeout(() => {
                        loadingOverlay.classList.add("opacity-0", "pointer-events-none");
                    }, 500);
                    return;
                }

                const fragment = document.createDocumentFragment();
                const limit = Math.min(renderedCount + CHUNK_SIZE, filteredTocItems.length);

                for (let i = renderedCount; i < limit; i++) {
                    const item = filteredTocItems[i];
                    const btn = document.createElement("button");
                    btn.className = "w-full text-right px-3 py-2.5 text-sm rounded-lg hover-item hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-150 truncate block border-b border-slate-100/50 dark:border-slate-800/30 font-medium text-slate-700 dark:text-slate-300";
                    
                    // Clean chapter titles
                    const titleText = item.label ? item.label.replace(/[\r\n\t]+/g, " ").trim() : `باب ${i + 1}`;
                    btn.textContent = titleText;
                    btn.title = titleText;

                    btn.addEventListener("click", () => {
                        rendition.display(item.href);
                        // Auto-close sidebar on mobile viewports
                        if (window.innerWidth < 1024) {
                            sidebar.classList.add("translate-x-full");
                        }
                    });

                    fragment.appendChild(btn);
                }

                tocContainer.appendChild(fragment);
                renderedCount = limit;
                renderedTocCountEl.textContent = renderedCount;

                // Yield control to browser to paint UI, preventing freeze
                requestAnimationFrame(renderTocChunksAsync);
            }

            // Helper to flatten nested epub TOC structure safely
            function flattenToc(toc) {
                let temp = [];
                toc.forEach(item => {
                    temp.push(item);
                    if (item.subitems && item.subitems.length > 0) {
                        temp = temp.concat(flattenToc(item.subitems));
                    }
                });
                return temp;
            }

            // Search logic within TOC with debounce
            let searchTimeout;
            tocSearch.addEventListener("input", (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const query = e.target.value.toLowerCase().trim();
                    tocContainer.innerHTML = "";
                    renderedCount = 0;

                    if (query === "") {
                        filteredTocItems = [...originalTocItems];
                    } else {
                        filteredTocItems = originalTocItems.filter(item => 
                            item.label && item.label.toLowerCase().includes(query)
                        );
                    }
                    
                    renderTocChunksAsync();
                }, 250);
            });

            // Sync navigation locations and display metadata
            rendition.on("relocated", (location) => {
                const percent = book.locations.percentageFromCfi(location.start.cfi);
                const percentageString = percent >= 0 ? `${Math.round(percent * 100)}%` : "--";
                
                document.getElementById("book-progress").textContent = `التقدم المقدر: ${percentageString}`;
                document.getElementById("book-location").textContent = `الموقع: ${location.start.displayed.page} / ${location.end.displayed.page}`;

                // Try to resolve current chapter title in header
                if (book.navigation && location.start.cfi) {
                    const chapter = book.navigation.get(location.start.cfi);
                    if (chapter && chapter.label) {
                        currentChapterTitle.textContent = chapter.label.trim();
                    } else {
                        currentChapterTitle.textContent = "صحيح البخاري - أبواب منوعة";
                    }
                }
            });

            // UI Interaction Handlers
            prevBtn.addEventListener("click", () => {
                rendition.prev();
            });

            nextBtn.addEventListener("click", () => {
                rendition.next();
            });

            // Keyboard support
            document.addEventListener("keyup", (e) => {
                if (e.key === "ArrowLeft") rendition.next();
                if (e.key === "ArrowRight") rendition.prev();
            });

            // Font Size Adjustments
            document.getElementById("font-inc").addEventListener("click", () => {
                currentFontSize = Math.min(currentFontSize + 10, 250);
                rendition.themes.fontSize(`${currentFontSize}%`);
            });

            document.getElementById("font-dec").addEventListener("click", () => {
                currentFontSize = Math.max(currentFontSize - 10, 80);
                rendition.themes.fontSize(`${currentFontSize}%`);
            });

            // Sidebar Toggle
            sidebarToggle.addEventListener("click", () => {
                sidebar.classList.toggle("translate-x-full");
            });

            // Dynamic loading screen updater helper
            function updateLoadingState(percent, statusText) {
                loadingProgress.style.width = `${percent}%`;
                loadingStatus.textContent = statusText;
            }

            // Global theme switcher function (accessible via HTML inline click)
            window.changeTheme = function(theme) {
                const html = document.documentElement;
                
                // Reset classes
                html.classList.remove("dark", "theme-sepia");
                document.body.classList.remove("theme-sepia");
                
                // Apply specific theme
                if (theme === "dark") {
                    html.classList.add("dark");
                    rendition.themes.register("dark", {
                        "body": { "background-color": "#0f172a", "color": "#f1f5f9" },
                        "p": { "font-family": "Amiri, serif !important", "line-height": "1.8" }
                    });
                    rendition.themes.select("dark");
                } else if (theme === "sepia") {
                    html.classList.add("theme-sepia");
                    document.body.classList.add("theme-sepia");
                    rendition.themes.register("sepia", {
                        "body": { "background-color": "#fbf0d9", "color": "#432c0e" },
                        "p": { "font-family": "Amiri, serif !important", "line-height": "1.8" }
                    });
                    rendition.themes.select("sepia");
                } else {
                    rendition.themes.register("light", {
                        "body": { "background-color": "#ffffff", "color": "#0f172a" },
                        "p": { "font-family": "Amiri, serif !important", "line-height": "1.8" }
                    });
                    rendition.themes.select("light");
                }
                
                localStorage.setItem("reader-theme", theme);
            };

            function applyTheme(theme) {
                window.changeTheme(theme);
            }
        });
    </script>
</body>
</html>
