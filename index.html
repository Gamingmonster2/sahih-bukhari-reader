<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الكتب الإلكترونية المتقدم</title>
    
    <!-- Google Fonts - Cairo for Beautiful Arabic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Dependencies: JSZip must be loaded before ePub.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epubjs/0.3.88/epub.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        sepia: {
                            50: '#fbf0e3',
                            100: '#faedd9',
                            200: '#f5dcb3',
                            900: '#433422',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        /* Hide default epubjs navigation controls if any */
        iframe {
            color-scheme: light dark;
        }
    </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300 overflow-hidden flex flex-col">

    <!-- Full-screen Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 text-white p-6 text-center">
        <div class="relative flex items-center justify-center mb-6">
            <div class="animate-spin rounded-full h-24 w-24 border-b-4 border-t-4 border-blue-500"></div>
            <div class="absolute text-blue-500 font-bold text-xl">ePub</div>
        </div>
        <h2 id="loading-status" class="text-2xl font-bold mb-3 tracking-wide animate-pulse">جاري تهيئة النظام...</h2>
        <p id="loading-substatus" class="text-sm text-gray-400 max-w-md">يرجى الانتظار بينما نقوم بإعداد بيئة القراءة وتجهيز الأصول الفنية.</p>
        
        <!-- Progress Bar -->
        <div class="w-64 bg-gray-800 rounded-full h-1.5 mt-6 overflow-hidden">
            <div id="loading-progress" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 10%;"></div>
        </div>
    </div>

    <!-- Error Overlay (Hidden by Default) -->
    <div id="error-overlay" class="fixed inset-0 z-50 hidden flex-col items-center justify-center bg-slate-900 text-white p-6 text-center">
        <div class="bg-red-900/30 border border-red-500/50 p-8 rounded-2xl max-w-lg shadow-2xl">
            <svg class="mx-auto h-16 w-16 text-red-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <h2 class="text-2xl font-bold mb-2">فشل تحميل الكتاب</h2>
            <p id="error-message" class="text-gray-300 mb-6 text-sm leading-relaxed"></p>
            <button onclick="window.location.reload()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-6 rounded-xl transition duration-200">
                إعادة المحاولة
            </button>
        </div>
    </div>

    <!-- Main App Header -->
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center justify-between shadow-sm z-30 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <button id="sidebar-toggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition" title="قائمة المحتويات">
                <svg class="w-6 h-6 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <h1 id="book-title" class="text-base md:text-lg font-bold text-gray-800 dark:text-gray-100 truncate max-w-[180px] md:max-w-xs">جاري تحميل الكتاب...</h1>
        </div>

        <!-- Controls Panel -->
        <div class="flex items-center gap-1 md:gap-3">
            <!-- Font Size Control -->
            <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
                <button id="font-decrease" class="p-1.5 hover:bg-white dark:hover:bg-gray-700 rounded-lg transition text-xs font-bold" title="تصغير الخط">أ-</button>
                <span id="font-size-display" class="text-xs px-2 font-semibold text-gray-600 dark:text-gray-400">100%</span>
                <button id="font-increase" class="p-1.5 hover:bg-white dark:hover:bg-gray-700 rounded-lg transition text-xs font-bold" title="تكبير الخط">أ+</button>
            </div>

            <!-- Theme Switcher -->
            <button id="theme-toggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition" title="تبديل المظهر">
                <!-- Sun Icon -->
                <svg id="theme-sun" class="w-5 h-5 text-amber-500 hidden" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.46 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
                </svg>
                <!-- Moon Icon -->
                <svg id="theme-moon" class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                </svg>
            </button>

            <!-- Sepia Mode Switcher -->
            <button id="theme-sepia" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition text-amber-800 dark:text-amber-300 font-bold text-xs" title="وضع الورق القديم">
                بيج
            </button>

            <!-- Bookmark Button -->
            <button id="bookmark-toggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition" title="حفظ العلامة المرجعية">
                <svg id="bookmark-icon" class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 flex relative overflow-hidden">
        
        <!-- Sidebar (Table of Contents / Bookmarks / Search) -->
        <aside id="sidebar" class="fixed inset-y-0 right-0 z-40 w-80 transform translate-x-full transition-transform duration-300 ease-in-out bg-white dark:bg-gray-900 border-l border-gray-200 dark:border-gray-800 flex flex-col shadow-2xl md:shadow-none md:static md:translate-x-0">
            <!-- Sidebar Header & Tabs -->
            <div class="p-4 border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-lg text-gray-800 dark:text-gray-100">لوحة التحكم</h3>
                    <button id="sidebar-close" class="md:hidden p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Tab Controls -->
                <div class="flex border-b border-gray-100 dark:border-gray-800 text-sm">
                    <button id="tab-toc-btn" class="flex-1 pb-2 font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400">الفهرس</button>
                    <button id="tab-bookmarks-btn" class="flex-1 pb-2 text-gray-500 dark:text-gray-400 border-b-2 border-transparent hover:text-gray-700">العلامات</button>
                    <button id="tab-search-btn" class="flex-1 pb-2 text-gray-500 dark:text-gray-400 border-b-2 border-transparent hover:text-gray-700">البحث</button>
                </div>
            </div>

            <!-- Tab Contents Container -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- TOC Tab -->
                <div id="tab-toc" class="space-y-1">
                    <div id="toc-container" class="space-y-1">
                        <!-- Dynamic TOC goes here -->
                    </div>
                </div>

                <!-- Bookmarks Tab -->
                <div id="tab-bookmarks" class="hidden space-y-2">
                    <p class="text-xs text-gray-400 mb-2">انقر على العلامة المرجعية للانتقال مباشرة للصفحة المحفوظة.</p>
                    <div id="bookmarks-container" class="space-y-1">
                        <!-- Saved bookmarks list -->
                    </div>
                </div>

                <!-- Search Tab -->
                <div id="tab-search" class="hidden space-y-4">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="اكتب للبحث في الكتاب..." class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl py-2 px-4 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button id="search-submit" class="absolute left-3 top-2.5 text-gray-400 hover:text-blue-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </button>
                    </div>
                    <div id="search-results-status" class="text-xs text-gray-400"></div>
                    <div id="search-results-container" class="space-y-2 max-h-[400px] overflow-y-auto">
                        <!-- Search results -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Viewer Window -->
        <main class="flex-1 flex flex-col relative bg-white dark:bg-gray-950 transition-colors duration-300">
            <!-- Sidebar Overlay for Mobile -->
            <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 opacity-0 pointer-events-none transition-opacity duration-300 md:hidden"></div>

            <!-- ePub Render Target -->
            <div id="viewer-container" class="flex-1 relative w-full h-full px-4 md:px-12 py-6">
                <!-- Left/Right Hotspots for click-to-turn-page (Hidden on touch devices if desired, or styled minimal) -->
                <button id="prev-page-btn" class="absolute right-0 top-0 bottom-0 w-8 md:w-16 flex items-center justify-center bg-gradient-to-l from-black/[0.02] to-transparent hover:from-black/[0.05] dark:from-white/[0.01] dark:hover:from-white/[0.03] transition-all group z-20" title="الصفحة السابقة">
                    <span class="p-2 rounded-full bg-white/80 dark:bg-gray-800/80 shadow-md transform translate-x-2 group-hover:translate-x-0 transition opacity-0 group-hover:opacity-100 hidden md:block">
                        <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </span>
                </button>

                <!-- The Actual Book Frame Target -->
                <div id="viewer" class="w-full h-full"></div>

                <button id="next-page-btn" class="absolute left-0 top-0 bottom-0 w-8 md:w-16 flex items-center justify-center bg-gradient-to-r from-black/[0.02] to-transparent hover:from-black/[0.05] dark:from-white/[0.01] dark:hover:from-white/[0.03] transition-all group z-20" title="الصفحة التالية">
                    <span class="p-2 rounded-full bg-white/80 dark:bg-gray-800/80 shadow-md transform -translate-x-2 group-hover:translate-x-0 transition opacity-0 group-hover:opacity-100 hidden md:block">
                        <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Reading Progress Footer Controls -->
            <footer class="bg-gray-50 dark:bg-gray-900/50 border-t border-gray-200 dark:border-gray-800 px-6 py-4 flex flex-col gap-3 transition-colors duration-300">
                <div class="flex items-center justify-between text-xs font-semibold text-gray-500 dark:text-gray-400">
                    <span id="current-chapter" class="truncate max-w-[200px] md:max-w-md">الفصل الحالي</span>
                    <span id="reading-percentage">0% مقروء</span>
                </div>
                
                <!-- Progress Bar Slider -->
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-400">البداية</span>
                    <input id="progress-slider" type="range" min="0" max="100" value="0" step="1" class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500 focus:outline-none">
                    <span class="text-xs font-bold text-gray-400">النهاية</span>
                </div>
            </footer>
        </main>
    </div>

    <!-- SPA Application Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // --- State Management ---
            const BOOK_PATH = "./79565.epub";
            const CACHE_NAME = "epub-reader-cache-v1";
            
            let book = null;
            let rendition = null;
            let displayed = null;
            let bookLocations = null;
            
            // App state stored in localStorage
            let appState = {
                theme: localStorage.getItem("epub-theme") || "light", // light, dark, sepia
                fontSize: parseInt(localStorage.getItem("epub-font-size")) || 100,
                lastLocation: localStorage.getItem("epub-last-location") || null,
                bookmarks: JSON.parse(localStorage.getItem("epub-bookmarks")) || []
            };

            // --- Cache Engine & Initialization ---
            const loadingOverlay = document.getElementById("loading-overlay");
            const loadingStatus = document.getElementById("loading-status");
            const loadingProgress = document.getElementById("loading-progress");
            const errorOverlay = document.getElementById("error-overlay");
            const errorMessage = document.getElementById("error-message");

            function updateLoadingState(status, percentage) {
                loadingStatus.textContent = status;
                loadingProgress.style.width = `${percentage}%`;
            }

            function showError(msg) {
                loadingOverlay.classList.add("hidden");
                errorOverlay.classList.remove("hidden");
                errorMessage.textContent = msg;
            }

            async function loadBookData() {
                try {
                    updateLoadingState("جاري التحقق من الذاكرة المؤقتة...", 20);
                    
                    // Native Cache API check
                    if ('caches' in window) {
                        const cache = await caches.open(CACHE_NAME);
                        let cachedResponse = await cache.match(BOOK_PATH);

                        if (!cachedResponse) {
                            updateLoadingState("جاري تنزيل ملف الكتاب من الخادم...", 40);
                            
                            // Fetch with progress if possible, otherwise standard fetch
                            const response = await fetch(BOOK_PATH);
                            if (!response.ok) {
                                throw new Error(`فشل تحميل الملف من المسار المحدد: ${response.statusText}`);
                            }

                            // Store in cache
                            await cache.put(BOOK_PATH, response.clone());
                            cachedResponse = response;
                        }

                        updateLoadingState("جاري معالجة وفك ضغط الكتاب...", 70);
                        const arrayBuffer = await cachedResponse.arrayBuffer();
                        initializeEpub(arrayBuffer);
                    } else {
                        // Fallback if Cache API is not supported
                        updateLoadingState("جاري تحميل الكتاب مباشرة...", 50);
                        const response = await fetch(BOOK_PATH);
                        if (!response.ok) throw new Error("فشل تحميل الملف");
                        const arrayBuffer = await response.arrayBuffer();
                        initializeEpub(arrayBuffer);
                    }
                } catch (err) {
                    console.error("Initialization error:", err);
                    showError(err.message || "حدث خطأ غير متوقع أثناء محاولة تحميل الكتاب.");
                }
            }

            function initializeEpub(bookData) {
                updateLoadingState("جاري تهيئة محرك القراءة...", 85);
                
                try {
                    // Initialize ePub.js with binary array data
                    book = ePub(bookData);
                    
                    // Render rendition
                    rendition = book.renderTo("viewer", {
                        width: "100%",
                        height: "100%",
                        spread: "always",
                        restore: true,
                        flow: "paginated"
                    });

                    // Set default themes
                    registerRenditionThemes();
                    applyTheme(appState.theme);

                    // Display initial page (either saved location or beginning)
                    const targetLoc = appState.lastLocation || undefined;
                    displayed = rendition.display(targetLoc);

                    displayed.then(() => {
                        updateLoadingState("جاري عرض الصفحة الأولى...", 95);
                    });

                    // Book is loaded completely
                    book.ready.then(() => {
                        // Generate locations for reading progress calculations
                        return book.locations.generate(1024);
                    }).then(() => {
                        bookLocations = book.locations;
                        updateProgressUI();
                        // Hide loading overlay once fully rendered
                        rendition.on("rendered", () => {
                            loadingOverlay.classList.add("hidden");
                        });
                    }).catch(e => {
                        // Fallback if location generation fails, we still want to read the book
                        console.warn("Location generation failed, progress tracking might be limited.", e);
                        loadingOverlay.classList.add("hidden");
                    });

                    // Build table of contents safely
                    book.loaded.navigation.then(nav => {
                        buildTOC(nav.toc);
                    }).catch(err => {
                        console.error("TOC Load error:", err);
                        document.getElementById("toc-container").innerHTML = `<p class="text-sm text-red-500">فشل تحميل الفهرس</p>`;
                    });

                    // Set up event listeners for rendition
                    setupRenditionListeners();

                } catch (err) {
                    showError("فشل في تحليل ملف الـ ePub. قد يكون الملف تالفاً.");
                }
            }

            // --- Theme Handling ---
            const themeSun = document.getElementById("theme-sun");
            const themeMoon = document.getElementById("theme-moon");

            function registerRenditionThemes() {
                // Register Dark and Light modes inside the iframe
                rendition.themes.register("light", {
                    body: {
                        "background-color": "#ffffff !important",
                        "color": "#111827 !important",
                        "font-family": "'Cairo', system-ui, sans-serif !important",
                        "line-height": "1.8 !important",
                        "direction": "rtl !important",
                        "text-align": "justify !important"
                    },
                    p: { "font-size": "1.1rem !important", "margin-bottom": "1.25em !important" },
                    a: { "color": "#2563eb !important" }
                });

                rendition.themes.register("dark", {
                    body: {
                        "background-color": "#030712 !important",
                        "color": "#f9fafb !important",
                        "font-family": "'Cairo', system-ui, sans-serif !important",
                        "line-height": "1.8 !important",
                        "direction": "rtl !important",
                        "text-align": "justify !important"
                    },
                    p: { "font-size": "1.1rem !important", "margin-bottom": "1.25em !important" },
                    a: { "color": "#60a5fa !important" }
                });

                rendition.themes.register("sepia", {
                    body: {
                        "background-color": "#fbf0e3 !important",
                        "color": "#433422 !important",
                        "font-family": "'Cairo', system-ui, sans-serif !important",
                        "line-height": "1.8 !important",
                        "direction": "rtl !important",
                        "text-align": "justify !important"
                    },
                    p: { "font-size": "1.1rem !important", "margin-bottom": "1.25em !important" },
                    a: { "color": "#b45309 !important" }
                });
            }

            function applyTheme(themeName) {
                appState.theme = themeName;
                localStorage.setItem("epub-theme", themeName);

                // Update UI classes
                document.documentElement.classList.remove("dark", "sepia-mode");
                
                if (themeName === "dark") {
                    document.documentElement.classList.add("dark");
                    themeSun.classList.remove("hidden");
                    themeMoon.classList.add("hidden");
                } else if (themeName === "sepia") {
                    // Custom Sepia Handling
                    document.documentElement.classList.add("sepia-mode");
                    document.body.className = "h-full bg-sepia-50 text-sepia-900 transition-colors duration-300 overflow-hidden flex flex-col";
                    themeSun.classList.add("hidden");
                    themeMoon.classList.remove("hidden");
                } else {
                    // Light mode
                    document.body.className = "h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300 overflow-hidden flex flex-col";
                    themeSun.classList.add("hidden");
                    themeMoon.classList.remove("hidden");
                }

                // Apply inside iframe
                if (rendition) {
                    rendition.themes.select(themeName);
                }
            }

            // Theme click actions
            document.getElementById("theme-toggle").addEventListener("click", () => {
                if (appState.theme === "dark") {
                    applyTheme("light");
                } else {
                    applyTheme("dark");
                }
            });

            document.getElementById("theme-sepia").addEventListener("click", () => {
                if (appState.theme === "sepia") {
                    applyTheme("light");
                } else {
                    applyTheme("sepia");
                }
            });

            // --- Font Sizing ---
            const fontSizeDisplay = document.getElementById("font-size-display");
            
            function applyFontSize(size) {
                appState.fontSize = size;
                localStorage.setItem("epub-font-size", size);
                fontSizeDisplay.textContent = `${size}%`;
                if (rendition) {
                    rendition.themes.fontSize(`${size}%`);
                }
            }

            document.getElementById("font-increase").addEventListener("click", () => {
                if (appState.fontSize < 200) applyFontSize(appState.fontSize + 10);
            });

            document.getElementById("font-decrease").addEventListener("click", () => {
                if (appState.fontSize > 70) applyFontSize(appState.fontSize - 10);
            });


            // --- TOC Safety Engine ---
            function buildTOC(toc) {
                const container = document.getElementById("toc-container");
                container.innerHTML = "";

                // Safety checks: Ensure TOC is parsed cleanly even if structured oddly
                if (!toc || (!Array.isArray(toc) && typeof toc !== 'object')) {
                    container.innerHTML = `<p class="text-sm text-gray-400">لا يوجد فهرس متاح لهذا الكتاب.</p>`;
                    return;
                }

                const normalizedTOC = Array.isArray(toc) ? toc : [toc];
                
                if (normalizedTOC.length === 0) {
                    container.innerHTML = `<p class="text-sm text-gray-400">لا يوجد فهرس متاح لهذا الكتاب.</p>`;
                    return;
                }

                // Recursive renderer to safely handle nested structures
                function renderItems(items, depth = 0) {
                    items.forEach(item => {
                        if (!item) return;

                        const btn = document.createElement("button");
                        btn.className = `w-full text-right py-2.5 px-3 rounded-xl text-sm transition-all duration-150 flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 font-medium`;
                        btn.style.paddingRight = `${(depth * 12) + 12}px`;

                        // Visual hierarchy markers
                        const bullet = document.createElement("span");
                        bullet.className = depth === 0 
                            ? "w-2 h-2 rounded-full bg-blue-500 shrink-0" 
                            : "w-1.5 h-1.5 rounded-full bg-gray-400 dark:bg-gray-600 shrink-0";
                        btn.appendChild(bullet);

                        const labelText = document.createElement("span");
                        labelText.textContent = (item.label || "فصل غير مسمى").trim();
                        labelText.className = "truncate flex-1";
                        btn.appendChild(labelText);

                        btn.addEventListener("click", () => {
                            if (item.href) {
                                rendition.display(item.href);
                                closeSidebar();
                            }
                        });

                        container.appendChild(btn);

                        // Safe check for subitems
                        if (item.subitems && Array.isArray(item.subitems) && item.subitems.length > 0) {
                            renderItems(item.subitems, depth + 1);
                        }
                    });
                }

                renderItems(normalizedTOC);
            }

            // --- Rendition Navigation & Progress Events ---
            function setupRenditionListeners() {
                // Page Navigation Buttons
                document.getElementById("next-page-btn").addEventListener("click", () => {
                    // In RTL layout, standard epubjs flow requires .prev() to go to next chronological page
                    rendition.prev(); 
                });

                document.getElementById("prev-page-btn").addEventListener("click", () => {
                    rendition.next();
                });

                // Keyboard Support
                document.addEventListener("keyup", (e) => {
                    if (e.key === "ArrowLeft") rendition.next();
                    if (e.key === "ArrowRight") rendition.prev();
                });

                // Swipe Gesture Support inside iframe
                let startX = 0;
                rendition.on("touchstart", (event) => {
                    startX = event.changedTouches[0].clientX;
                });

                rendition.on("touchend", (event) => {
                    const endX = event.changedTouches[0].clientX;
                    const diffX = startX - endX;
                    // Swipe left to go next, right to go back
                    if (diffX > 50) {
                        rendition.next();
                    } else if (diffX < -50) {
                        rendition.prev();
                    }
                });

                // Relocated state updates
                rendition.on("relocated", (location) => {
                    appState.lastLocation = location.start.cfi;
                    localStorage.setItem("epub-last-location", location.start.cfi);

                    updateProgressUI(location);
                    updateBookmarkStatus(location.start.cfi);

                    // Dynamic chapter name display
                    if (book.navigation && book.navigation.get) {
                        const chapter = book.navigation.get(location.start.href);
                        if (chapter) {
                            document.getElementById("current-chapter").textContent = chapter.label;
                        }
                    }
                });

                // Resize handler
                window.addEventListener("resize", () => {
                    if (rendition) rendition.resize();
                });

                // Apply font size and theme immediately after display is complete
                rendition.on("rendered", () => {
                    rendition.themes.fontSize(`${appState.fontSize}%`);
                    rendition.themes.select(appState.theme);
                });
            }

            function updateProgressUI(location) {
                if (!bookLocations || !rendition) return;

                const currentLocation = location || rendition.currentLocation();
                if (currentLocation && currentLocation.start) {
                    const progress = bookLocations.percentageFromCfi(currentLocation.start.cfi);
                    const percentage = Math.round(progress * 100);
                    
                    document.getElementById("reading-percentage").textContent = `${percentage}% مقروء`;
                    document.getElementById("progress-slider").value = percentage;
                }
            }

            // Progress Slider action
            document.getElementById("progress-slider").addEventListener("change", (e) => {
                if (!bookLocations) return;
                const targetPercentage = e.target.value / 100;
                const targetCfi = bookLocations.cfiFromPercentage(targetPercentage);
                rendition.display(targetCfi);
            });


            // --- Sidebar Toggle & Navigation Tabs ---
            const sidebar = document.getElementById("sidebar");
            const sidebarOverlay = document.getElementById("sidebar-overlay");

            function openSidebar() {
                sidebar.classList.remove("translate-x-full");
                sidebarOverlay.classList.remove("opacity-0", "pointer-events-none");
            }

            function closeSidebar() {
                sidebar.classList.add("translate-x-full");
                sidebarOverlay.classList.add("opacity-0", "pointer-events-none");
            }

            document.getElementById("sidebar-toggle").addEventListener("click", openSidebar);
            document.getElementById("sidebar-close").addEventListener("click", closeSidebar);
            sidebarOverlay.addEventListener("click", closeSidebar);

            // Tab toggles
            const tabTocBtn = document.getElementById("tab-toc-btn");
            const tabBookmarksBtn = document.getElementById("tab-bookmarks-btn");
            const tabSearchBtn = document.getElementById("tab-search-btn");

            const tabToc = document.getElementById("tab-toc");
            const tabBookmarks = document.getElementById("tab-bookmarks");
            const tabSearch = document.getElementById("tab-search");

            function switchTab(activeBtn, activeTab) {
                [tabTocBtn, tabBookmarksBtn, tabSearchBtn].forEach(btn => {
                    btn.classList.remove("border-blue-500", "text-blue-600", "dark:text-blue-400");
                    btn.classList.add("text-gray-500", "dark:text-gray-400", "border-transparent");
                });
                [tabToc, tabBookmarks, tabSearch].forEach(tab => tab.classList.add("hidden"));

                activeBtn.classList.add("border-blue-500", "text-blue-600", "dark:text-blue-400");
                activeBtn.classList.remove("text-gray-500", "dark:text-gray-400", "border-transparent");
                activeTab.classList.remove("hidden");
            }

            tabTocBtn.addEventListener("click", () => switchTab(tabTocBtn, tabToc));
            tabBookmarksBtn.addEventListener("click", () => {
                switchTab(tabBookmarksBtn, tabBookmarks);
                renderBookmarksList();
            });
            tabSearchBtn.addEventListener("click", () => switchTab(tabSearchBtn, tabSearch));


            // --- Bookmarks Engine ---
            const bookmarkIcon = document.getElementById("bookmark-icon");

            function updateBookmarkStatus(cfi) {
                const exists = appState.bookmarks.some(b => b.cfi === cfi);
                if (exists) {
                    bookmarkIcon.setAttribute("fill", "currentColor");
                    bookmarkIcon.classList.add("text-blue-500");
                } else {
                    bookmarkIcon.setAttribute("fill", "none");
                    bookmarkIcon.classList.remove("text-blue-500");
                }
            }

            document.getElementById("bookmark-toggle").addEventListener("click", () => {
                if (!rendition) return;
                const currentLoc = rendition.currentLocation().start;
                const currentCfi = currentLoc.cfi;
                
                const existingIndex = appState.bookmarks.findIndex(b => b.cfi === currentCfi);

                if (existingIndex > -1) {
                    // Remove bookmark
                    appState.bookmarks.splice(existingIndex, 1);
                } else {
                    // Add bookmark
                    let label = "علامة مرجعية مخصصة";
                    if (book.navigation && book.navigation.get) {
                        const chapter = book.navigation.get(currentLoc.href);
                        if (chapter) label = chapter.label;
                    }
                    appState.bookmarks.push({
                        cfi: currentCfi,
                        label: label,
                        date: new Date().toLocaleDateString('ar-EG')
                    });
                }

                localStorage.setItem("epub-bookmarks", JSON.stringify(appState.bookmarks));
                updateBookmarkStatus(currentCfi);
                renderBookmarksList();
            });

            function renderBookmarksList() {
                const container = document.getElementById("bookmarks-container");
                container.innerHTML = "";

                if (appState.bookmarks.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">لا توجد علامات مرجعية محفوظة حالياً.</p>`;
                    return;
                }

                appState.bookmarks.forEach((b, index) => {
                    const div = document.createElement("div");
                    div.className = "flex items-center justify-between p-2 rounded-lg bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-sm";
                    
                    const btn = document.createElement("button");
                    btn.className = "text-right flex-1 font-medium text-gray-700 dark:text-gray-300 truncate";
                    btn.innerHTML = `<span class="block text-xs text-gray-400">${b.date}</span> ${b.label}`;
                    btn.addEventListener("click", () => {
                        rendition.display(b.cfi);
                        closeSidebar();
                    });

                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "p-1 hover:bg-red-50 dark:hover:bg-red-950/30 text-red-500 rounded-md transition";
                    deleteBtn.innerHTML = `
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    `;
                    deleteBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        appState.bookmarks.splice(index, 1);
                        localStorage.setItem("epub-bookmarks", JSON.stringify(appState.bookmarks));
                        renderBookmarksList();
                        updateBookmarkStatus(rendition.currentLocation().start.cfi);
                    });

                    div.appendChild(btn);
                    div.appendChild(deleteBtn);
                    container.appendChild(div);
                });
            }


            // --- High-Performance Book Search Engine ---
            const searchInput = document.getElementById("search-input");
            const searchSubmit = document.getElementById("search-submit");
            const searchStatus = document.getElementById("search-results-status");
            const searchResultsContainer = document.getElementById("search-results-container");

            async function performSearch() {
                const query = searchInput.value.trim();
                if (!query) return;

                searchStatus.textContent = "جاري البحث في الصفحات...";
                searchResultsContainer.innerHTML = `
                    <div class="flex items-center justify-center p-6">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                    </div>
                `;

                try {
                    const results = await Promise.all(
                        book.spine.spineItems.map(item => 
                            item.load(book.load.bind(book))
                                .then(item.find.bind(item, query))
                                .finally(item.unload.bind(item))
                        )
                    );
                    
                    // Flatten search results
                    const flatResults = [].concat.apply([], results);
                    displaySearchResults(flatResults);
                } catch (err) {
                    console.error("Search error:", err);
                    searchStatus.textContent = "فشل إجراء عملية البحث.";
                    searchResultsContainer.innerHTML = "";
                }
            }

            function displaySearchResults(results) {
                searchResultsContainer.innerHTML = "";
                if (results.length === 0) {
                    searchStatus.textContent = "لم يتم العثور على نتائج للبحث المحدد.";
                    return;
                }

                searchStatus.textContent = `تم العثور على ${results.length} نتيجة:`;

                results.forEach(item => {
                    const btn = document.createElement("button");
                    btn.className = "w-full text-right p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all text-sm block";
                    
                    // Highlight the query word in excerpt
                    const excerpt = item.excerpt.replace(
                        new RegExp(searchInput.value.trim(), 'gi'),
                        match => `<mark class="bg-amber-200 dark:bg-amber-900/60 dark:text-amber-200 px-1 rounded">${match}</mark>`
                    );

                    btn.innerHTML = `<p class="text-xs text-blue-500 mb-1">انقر للانتقال</p><p class="text-gray-600 dark:text-gray-300 leading-relaxed">${excerpt}</p>`;
                    btn.addEventListener("click", () => {
                        rendition.display(item.cfi);
                        closeSidebar();
                    });

                    searchResultsContainer.appendChild(btn);
                });
            }

            searchSubmit.addEventListener("click", performSearch);
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") performSearch();
            });


            // --- Start the App Engine ---
            loadBookData();
        });
    </script>
</body>
</html>
